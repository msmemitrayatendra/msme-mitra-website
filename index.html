<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MSME Mitra</title>

<style>

body{
font-family: Arial;
margin:0;
padding:0;
background:#f5f5f5;
}

/* HEADER */
header{
background:#0b6efd;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

/* SECTION */
.loan-section{
padding:20px;
}

/* BUTTONS */
.loan-section button{
display:block;
width:100%;
margin:10px 0;
padding:12px;
background:#0b6efd;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

/* SUB SERVICES */
.services{
display:none;
margin-left:15px;
}

/* DETAIL BOX */
#serviceDetail{
margin:20px;
padding:20px;
background:white;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.apply-btn{
background:green;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
}

</style>

</head>

<body>

<header>
MSME MITRA – Government Loan & Schemes
</header>

<section class="loan-section">

<h2>Government Loan & Other Schemes</h2>

<!-- MSME -->
<button onclick="toggleCategory('msme')">Business / MSME Loans</button>
<div id="msme" class="services">
<button onclick="showService('mudra')">PM Mudra Loan</button>
<button onclick="showService('pmegp')">PMEGP Loan</button>
<button onclick="showService('cgtmse')">CGTMSE Loan</button>
</div>

<!-- Agriculture -->
<button onclick="toggleCategory('agriculture')">Agriculture Loans</button>
<div id="agriculture" class="services">
<button onclick="showService('kcc')">Kisan Credit Card</button>
</div>

<!-- Street Vendor -->
<button onclick="toggleCategory('street')">Small Business / Street Vendor</button>
<div id="street" class="services">
<button onclick="showService('svanidhi')">PM SVANidhi Loan</button>
</div>

<!-- Housing -->
<button onclick="toggleCategory('housing')">Housing Loan Schemes</button>
<div id="housing" class="services">
<button onclick="showService('pmay')">PM Awas Yojana</button>
</div>

<!-- Education -->
<button onclick="toggleCategory('education')">Education Loan Schemes</button>
<div id="education" class="services">
<button onclick="showService('edu')">Education Loan</button>
</div>

<!-- Women -->
<button onclick="toggleCategory('women')">Women Loan Schemes</button>
<div id="women" class="services">
<button onclick="showService('standup')">Stand Up India</button>
</div>

<!-- Special -->
<button onclick="toggleCategory('special')">Special Category Loans</button>
<div id="special" class="services">
<button onclick="showService('scst')">SC/ST Loan Scheme</button>
</div>

<!-- Development -->
<button onclick="toggleCategory('development')">Other Development Loans</button>
<div id="development" class="services">
<button onclick="showService('startup')">Startup India Loan</button>
</div>

</section>

<!-- SERVICE DETAIL -->
<div id="serviceDetail"></div>

<script>

function toggleCategory(id){
let section = document.getElementById(id);

if(section.style.display === "block"){
section.style.display = "none";
}else{
section.style.display = "block";
}
}

function showService(service){

let data = {

mudra:{
title:"PM Mudra Loan",
desc:"Loan from ₹50,000 to ₹10 lakh for small business.",
docs:"Aadhar Card, PAN Card, Bank Statement"
},

pmegp:{
title:"PMEGP Loan",
desc:"Government scheme for new business startup.",
docs:"Aadhar Card, Project Report"
},

cgtmse:{
title:"CGTMSE Loan",
desc:"Collateral free loan for MSME businesses.",
docs:"Business proof, Aadhar, PAN"
},

kcc:{
title:"Kisan Credit Card",
desc:"Loan for farmers.",
docs:"Aadhar Card, Land Proof"
},

svanidhi:{
title:"PM SVANidhi Loan",
desc:"Loan for street vendors.",
docs:"Aadhar Card"
},

pmay:{
title:"PM Awas Yojana",
desc:"Home loan subsidy scheme.",
docs:"Aadhar Card, Income Proof"
},

edu:{
title:"Education Loan",
desc:"Loan for higher studies.",
docs:"Admission Proof"
},

standup:{
title:"Stand Up India Loan",
desc:"Loan for women & SC/ST.",
docs:"Aadhar, Business Plan"
},

scst:{
title:"SC/ST Loan Scheme",
desc:"Special loan for SC/ST category.",
docs:"Caste Certificate, Aadhar"
},

startup:{
title:"Startup India Loan",
desc:"Loan for startups.",
docs:"Business Plan"
}

};

let s = data[service];

document.getElementById("serviceDetail").innerHTML =

`
<h3>${s.title}</h3>
<p>${s.desc}</p>

<h4>Required Documents</h4>
<p>${s.docs}</p>

<a href="https://wa.me/91XXXXXXXXXX?text=I want to apply for ${s.title}" target="_blank">
<button class="apply-btn">Apply on WhatsApp</button>
</a>

<br><br>

<form onsubmit="submitForm(event, '${s.title}')">
<input type="text" placeholder="Full Name" required>
<input type="tel" placeholder="Mobile Number" required>
<button type="submit">Apply Now</button>
</form>
`;

}

function submitForm(e, service){
e.preventDefault();

let name = e.target[0].value;
let mobile = e.target[1].value;

let message = `Hello MSME Mitra,%0A
I want to apply for: ${service}%0A
Name: ${name}%0A
Mobile: ${mobile}`;

let whatsappNumber = "91XXXXXXXXXX"; // 👉 अपना नंबर डालो

let url = `https://wa.me/${whatsappNumber}?text=${message}`;

window.open(url, "_blank");
}

</script>

</body>
</html>
