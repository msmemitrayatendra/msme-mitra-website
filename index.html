<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSME Mitra</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
header{background:#0b6efd;color:#fff;padding:15px;text-align:center;font-size:22px;}
.section{padding:20px;}
button{
display:block;width:100%;margin:6px 0;padding:12px;
background:#0b6efd;color:#fff;border:none;border-radius:6px;
cursor:pointer;
}
.sub{display:none;margin-left:15px;}
#detail{margin:20px;padding:20px;background:#fff;border-radius:8px;}
input{width:100%;padding:10px;margin:5px 0;}
.apply{background:green;}
</style>

</head>

<body>

<header>MSME MITRA – ALL SERVICES PORTAL</header>

<div class="section">

<h2>All Services</h2>

<!-- CATEGORY 1 -->
<button onclick="toggle('gov')">Government Loan & Other Schemes</button>
<div id="gov" class="sub">
<button onclick="show('mudra')">PM Mudra Loan</button>
<button onclick="show('pmegp')">PMEGP Loan</button>
<button onclick="show('cgtmse')">CGTMSE Loan</button>
<button onclick="show('sidbi')">SIDBI Loan</button>
<button onclick="show('kcc')">KCC Loan</button>
<button onclick="show('dairy')">Dairy Loan</button>
<button onclick="show('svanidhi')">SVANidhi Loan</button>
<button onclick="show('pmay')">PMAY</button>
<button onclick="show('edu')">Education Loan</button>
<button onclick="show('standup')">Stand Up India</button>
</div>

<!-- CATEGORY 2 -->
<button onclick="toggle('pvt')">Private Loan & Credit Card</button>
<div id="pvt" class="sub">
<button onclick="show('personal')">Personal Loan</button>
<button onclick="show('business')">Business Loan</button>
<button onclick="show('home')">Home Loan</button>
<button onclick="show('lap')">Loan Against Property</button>
<button onclick="show('car')">Car Loan</button>
<button onclick="show('bike')">Bike Loan</button>
<button onclick="show('cc')">Credit Card</button>
</div>

<!-- CATEGORY 3 -->
<button onclick="toggle('tax')">Taxation & Registration</button>
<div id="tax" class="sub">
<button onclick="show('gstreg')">GST Registration</button>
<button onclick="show('gstr')">GST Return</button>
<button onclick="show('itr')">ITR Filing</button>
<button onclick="show('msme')">MSME Registration</button>
<button onclick="show('fssai')">FSSAI License</button>
<button onclick="show('tm')">Trademark</button>
<button onclick="show('company')">Company Reg.</button>
</div>

<!-- CATEGORY 4 -->
<button onclick="toggle('ins')">Insurance Services</button>
<div id="ins" class="sub">
<button onclick="show('life')">Life Insurance</button>
<button onclick="show('health')">Health Insurance</button>
<button onclick="show('motor')">Motor Insurance</button>
<button onclick="show('bikeins')">Bike Insurance</button>
<button onclick="show('term')">Term Plan</button>
</div>

<!-- CATEGORY 5 -->
<button onclick="toggle('other')">Other Services</button>
<div id="other" class="sub">
<button onclick="show('aeps')">AEPS</button>
<button onclick="show('pan')">PAN Card</button>
<button onclick="show('aadhar')">Aadhaar Update</button>
<button onclick="show('bill')">Bill Payment</button>
<button onclick="show('recharge')">Recharge</button>
<button onclick="show('money')">Money Transfer</button>
<button onclick="show('gpay')">Google Pay Setup</button>
<button onclick="show('franchise')">Franchise</button>
</div>

</div>

<div id="detail"></div>

<script>

function toggle(id){
let x=document.getElementById(id);
x.style.display=(x.style.display=="block")?"none":"block";
}

function show(service){

let data={
mudra:{t:"PM Mudra Loan",d:"Business loan upto 10L",doc:"Aadhar,PAN"},
pmegp:{t:"PMEGP Loan",d:"Startup scheme",doc:"Project"},
cgtmse:{t:"CGTMSE",d:"Collateral free",doc:"Business proof"},
sidbi:{t:"SIDBI",d:"MSME finance",doc:"Docs"},
kcc:{t:"KCC",d:"Farmer loan",doc:"Land proof"},
dairy:{t:"Dairy Loan",d:"Farming",doc:"Farm docs"},
svanidhi:{t:"SVANidhi",d:"Vendor loan",doc:"Vendor ID"},
pmay:{t:"PMAY",d:"Home subsidy",doc:"Income"},
edu:{t:"Education Loan",d:"Study loan",doc:"Admission"},
standup:{t:"StandUp",d:"Women/SC loan",doc:"Plan"},

personal:{t:"Personal Loan",d:"Instant loan",doc:"Aadhar"},
business:{t:"Business Loan",d:"Business funding",doc:"Docs"},
home:{t:"Home Loan",d:"House loan",doc:"Income"},
lap:{t:"Loan Against Property",d:"Property loan",doc:"Property"},
car:{t:"Car Loan",d:"Vehicle loan",doc:"DL"},
bike:{t:"Bike Loan",d:"2 wheeler loan",doc:"DL"},
cc:{t:"Credit Card",d:"Instant card",doc:"PAN"},

gstreg:{t:"GST Registration",d:"GST apply",doc:"Docs"},
gstr:{t:"GST Return",d:"File GST",doc:"Bills"},
itr:{t:"ITR Filing",d:"Income tax",doc:"Income"},
msme:{t:"MSME Registration",d:"Udyam reg",doc:"Aadhar"},
fssai:{t:"FSSAI",d:"Food license",doc:"Shop"},
tm:{t:"Trademark",d:"Brand reg",doc:"Logo"},
company:{t:"Company Reg.",d:"Pvt Ltd reg",doc:"Docs"},

life:{t:"Life Insurance",d:"Life cover",doc:"ID"},
health:{t:"Health Insurance",d:"Medical cover",doc:"ID"},
motor:{t:"Motor Insurance",d:"Car cover",doc:"RC"},
bikeins:{t:"Bike Insurance",d:"Bike cover",doc:"RC"},
term:{t:"Term Plan",d:"Long cover",doc:"ID"},

aeps:{t:"AEPS",d:"Cash withdrawal",doc:"Aadhar"},
pan:{t:"PAN Card",d:"PAN apply",doc:"ID"},
aadhar:{t:"Aadhaar Update",d:"Update",doc:"Aadhar"},
bill:{t:"Bill Payment",d:"Pay bills",doc:"None"},
recharge:{t:"Recharge",d:"Mobile recharge",doc:"None"},
money:{t:"Money Transfer",d:"Send money",doc:"Bank"},
gpay:{t:"Google Pay",d:"Setup",doc:"Mobile"},
franchise:{t:"Franchise",d:"Start business",doc:"ID"}
};

let s=data[service];

document.getElementById("detail").innerHTML=`
<h3>${s.t}</h3>
<p>${s.d}</p>
<p><b>Docs:</b> ${s.doc}</p>

<a href="https://wa.me/916398180950?text=Apply for ${s.t}">
<button class="apply">Apply WhatsApp</button>
</a>

<form onsubmit="send(event,'${s.t}')">
<input placeholder="Name" required>
<input placeholder="Mobile" required>
<button>Apply</button>
</form>
`;
}

function send(e,s){
e.preventDefault();
let n=e.target[0].value;
let m=e.target[1].value;
window.open(`https://wa.me/91XXXXXXXXXX?text=Service:${s}%0AName:${n}%0AMobile:${m}`);
}

</script>

</body>
</html>
