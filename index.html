<script>

function toggle(id){
let x=document.getElementById(id);
x.style.display=(x.style.display=="block")?"none":"block";
}

function show(service){

document.getElementById("detail").innerHTML=`
<h3>${service}</h3>
<p>Complete assistance available for this service.</p>
<p><b>Documents:</b> Aadhar Card, PAN Card, Basic Documents</p>

<a href="https://wa.me/916398180950?text=I want to apply for ${service}">
<button class="apply">Apply on WhatsApp</button>
</a>

<form onsubmit="send(event,'${service}')">
<input placeholder="Full Name" required>
<input placeholder="Mobile Number" required>
<button>Apply Now</button>
</form>
`;
}

function send(e,s){
e.preventDefault();
let n=e.target[0].value;
let m=e.target[1].value;

window.open(`https://wa.me/916398180950?text=Service:${s}%0AName:${n}%0AMobile:${m}`);
}

</script>
